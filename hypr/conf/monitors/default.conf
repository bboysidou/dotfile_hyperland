# ----------------------------------------------------- 
# Monitor Setup
# name: "Default"
# ----------------------------------------------------- 

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-2, 2560x1600@60, 0x0, 1.5
monitor=HDMI-A-1, 1920x1080@60, 1700x0, 1
monitor=DP-2, 1920x1080@60, auto, 1 ,transform, 3
# unscale XWayland
xwayland {
  force_zero_scaling = true
}
