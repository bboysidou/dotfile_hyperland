preload = ~/Pictures/wallpaper/night_city.jpg
#if more than one preload is desired then continue to preload other backgrounds
#preload = /path/to/next_image.png
# .. more preloads

#set the default wallpaper(s) seen on initial workspace(s) --depending on the number of monitors used
# wallpaper = DP-1,/home/sidouxp3/Pictures/wallpaper/arch_08.jpg
# wallpaper = HDMI-A-1,/home/sidouxp3/Pictures/wallpaper/arch_08.jpg
# wallpaper = eDP-2,/home/sidouxp3/Pictures/wallpaper/arch_08.jpg

wallpaper = DP-1,~/Pictures/wallpaper/night_city.jpg
wallpaper = HDMI-A-1,~/Pictures/wallpaper/night_city.jpg
wallpaper = eDP-2,~/Pictures/wallpaper/night_city.jpg
#if more than one monitor in use, can load a 2nd image
#wallpaper = monitor2,/path/to/next_image.png
# .. more monitors

#enable splash text rendering over the wallpaper
splash = false

#fully disable ipc
ipc = off
